name: Keep Alive

on:
  schedule:
      - cron: '*/15 * * * *'
        workflow_dispatch:

        jobs:
          ping:
              runs-on: ubuntu-latest
                  steps:
                        - name: Ping Streamlit App
                                run: curl -s -o /dev/null -w "%{http_code}" https://sefket24-support-tools-app-zwaemo.streamlit.app/
